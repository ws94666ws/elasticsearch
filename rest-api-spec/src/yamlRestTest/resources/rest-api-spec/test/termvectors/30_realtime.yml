---
setup:
  - do:
      cluster.put_settings:
        body:
          transient:
            # TRACE on IndexShard/Engine is enabled to capture unexpected refreshes
            # if the found: false assertion fails again (see #138370)
            logger.org.elasticsearch.index.shard.IndexShard: TRACE
            logger.org.elasticsearch.index.engine.Engine: TRACE

---
teardown:
  - do:
      cluster.put_settings:
        body:
          transient:
            logger.org.elasticsearch.index.shard.IndexShard: null
            logger.org.elasticsearch.index.engine.Engine: null

---
"Realtime Term Vectors":

 - do:
      indices.create:
        index:    test_1
        body:
          settings:
            index:
              refresh_interval: -1

 - do:
     cluster.health:
       wait_for_no_initializing_shards: true

 - do:
      index:
          index:   test_1
          id:      "1"
          body:    { foo: bar }

 - do:
      termvectors:
          index:    test_1
          id:       "1"
          realtime: false

 - is_false: found

 - do:
      termvectors:
          index:    test_1
          id:       "1"
          realtime: true

 - is_true: found
