---
setup:
  - requires:
      capabilities:
        - method: GET
          path: /_query/dataset
          capabilities: [data_sources]
      test_runner_features: capabilities
      reason: "ES|QL dataset CRUD API"

---
"get-empty":
  - do:
      esql.get_dataset: { }

  - match: { datasets: [] }

---
"invalid-dataset-names":
  # Name must be lowercase.
  - do:
      catch: /invalid dataset name/
      esql.put_dataset:
        name: "MyDataset"
        body:
          data_source: parent
          resource: "s3://x/"

  # Name must not contain invalid characters.
  - do:
      catch: /invalid dataset name/
      esql.put_dataset:
        name: "bad#name"
        body:
          data_source: parent
          resource: "s3://x/"

  # Whitespace-only name — validate() short-circuits with "name is missing" before the
  # invalid-char / lowercase checks, so the assertion differs.
  - do:
      catch: /dataset name is missing/
      esql.put_dataset:
        name: " "
        body:
          data_source: parent
          resource: "s3://x/"

  # Leading underscore is reserved for dot-indices / hidden names.
  - do:
      catch: /invalid dataset name/
      esql.put_dataset:
        name: "_leading"
        body:
          data_source: parent
          resource: "s3://x/"

---
"missing-data-source":
  - do:
      catch: /Required \[data_source\]/
      esql.put_dataset:
        name: ds
        body:
          resource: "s3://x/"
          settings: { }

---
"missing-resource":
  - do:
      catch: /Required \[resource\]/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent

---
"parent-data-source-not-found":
  # Data-source-side PUT requires a loaded validator plugin, so we can't create a parent here.
  # This exercises the dispatch-time parent lookup failure: dataset PUT with a non-existent parent
  # surfaces a 404 (ResourceNotFoundException) without reaching the validator dispatch path.
  - do:
      catch: missing
      esql.put_dataset:
        name: ds
        body:
          data_source: parent_does_not_exist
          resource: "s3://x/"
          settings: { }

---
"mappings-unknown-keys-rejected":
  # The declared-mapping vocabulary is strict: keys outside the deliberate index-mapping subset are
  # rejected at parse time (before any cluster interaction), naming the offending key.
  - requires:
      capabilities:
        - method: PUT
          path: /_query/dataset/{name}
          capabilities: [dataset_declared_schema]
      test_runner_features: capabilities
      reason: "declared mappings block on datasets"

  # Unknown mappings-level key (core mapping keys outside our subset are rejected too, e.g. runtime).
  - do:
      catch: /unknown mappings field \[runtime\]/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            dynamic: "true"
            runtime: { }

  # _id supports only [path].
  - do:
      catch: /unknown \[_id\] field \[type\]; only \[path\] is supported/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            _id: { type: keyword }

  # Field parameters outside {type, path, format} are rejected (index-mapping params we don't model).
  - do:
      catch: /\[analyzer\]/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            properties:
              msg: { type: keyword, analyzer: standard }

  # Unknown dynamic value: only true/false (the read-applicable subset of the index-mapping enum).
  - do:
      catch: /unknown dynamic value \[strict\]/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            dynamic: "strict"

---
"delete-missing":
  - do:
      catch: missing
      esql.delete_dataset:
        name: ghost

---
"get-missing":
  # Concrete-name miss -> 404. Wildcard miss -> 200 [].
  - do:
      catch: missing
      esql.get_dataset:
        name: ghost

  - do:
      esql.get_dataset:
        name: "no_match_*"

  - match: { datasets: [] }

---
"cluster-state-visibility":
  # DatasetMetadata.context() includes API, so if a dataset existed it would appear under
  # metadata.esql_dataset. With no datasets present, the custom is absent.
  - do:
      cluster.state: { }

  - is_false: metadata.esql_dataset

  # Counterpart assertion for the data source side: even if one existed, it would not appear here.
  - is_false: metadata.esql_datasource

---
"mappings-validator-rejections":
  # Semantic validator rejections (DeclaredSchemaValidator) run inside validatePutDataset, after the parent data
  # source is resolved — so create one, then assert an undeclarable type and a [format] on a non-date column are
  # both rejected with an actionable message.
  - requires:
      capabilities:
        - method: PUT
          path: /_query/dataset/{name}
          capabilities: [dataset_declared_schema]
      test_runner_features: capabilities
      reason: "declared mappings validation"

  - do:
      esql.put_data_source:
        name: parent
        body:
          type: s3
          settings:
            auth: anonymous

  - do:
      catch: /unsupported declared type \[geo_point\] for column \[g\]/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            properties:
              g: { type: geo_point }

  - do:
      catch: /\[format\] on column \[msg\] is only supported on \[date\] columns/
      esql.put_dataset:
        name: ds
        body:
          data_source: parent
          resource: "s3://x/*.csv"
          mappings:
            properties:
              msg: { type: keyword, format: "yyyy-MM-dd" }

  - do:
      esql.delete_data_source:
        name: parent
