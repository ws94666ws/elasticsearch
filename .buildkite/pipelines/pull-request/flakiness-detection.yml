config:
  # Smart retry skips tests that already passed on a prior attempt, which is the
  # opposite of what flakiness detection wants: the batch steps deliberately re-run
  # tests many times to surface flakiness, and the bootstrap step below only
  # orchestrates the sub-pipeline upload (it runs no Gradle tests). Opt out so
  # injectAutoRetry (see .buildkite/scripts/pull-request/pipeline.ts) does not add
  # an auto-retry block to this step.
  auto-retry: false
steps:
  - group: "flakiness-detection"
    steps:
      - label: "detect changed tests"
        command: |
          node .buildkite/scripts/flakiness-detection/entrypoints/pr.ts
        timeout_in_minutes: 10
        soft_fail: true
        # pr.ts writes this when it skips BWC tests that cannot be re-run via the
        # bare task; the generated analyze step downloads it and records them as
        # not_applicable. No-op when the file is absent.
        artifact_paths: flakiness-skipped.json
