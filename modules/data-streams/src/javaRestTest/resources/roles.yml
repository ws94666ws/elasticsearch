manage_data_stream_lifecycle:
  cluster:
    - monitor
  indices:
    - names: [ 'data-stream-lifecycle-*' ]
      privileges:
        - read
        - write
        - manage_data_stream_lifecycle
under_privilged:
  cluster:
    - monitor
  indices:
    - names: [ 'data-stream-lifecycle-*', 'lazy-ds*' ]
      privileges:
        - read
        - write
        - view_index_metadata
only_get:
  indices:
    - names: [ 'my-ds*' ]
      privileges:
        - read
        - view_index_metadata
tsdb_writer:
  indices:
    - names: [ 'metrics-tsdb-test*' ]
      privileges:
        - auto_configure
        - index
tsdb_limited_writer:
  indices:
    - names: [ 'metrics-tsdb-test*' ]
      privileges:
        - index
no_privilege:
