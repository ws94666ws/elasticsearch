---
"bitmap_terms rejected on non-integer field":

  - do:
      indices.create:
        index: test_bitmap_nonint
        body:
          mappings:
            properties:
              kw:
                type: keyword

  - do:
      catch: bad_request
      search:
        index: test_bitmap_nonint
        body:
          query:
            bitmap_terms:
              field: kw
              value: "OzAAAAEAAAoAAQAFAAoA"

---
"bitmap_terms rejected on index-disabled field":

  - do:
      indices.create:
        index: test_bitmap_noindex
        body:
          mappings:
            properties:
              num:
                type: integer
                index: false

  - do:
      catch: bad_request
      search:
        index: test_bitmap_noindex
        body:
          query:
            bitmap_terms:
              field: num
              value: "OzAAAAEAAAoAAQAFAAoA"
